<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold">Biomedical Data Platform</text>
  <rect x="50" y="60" width="150" height="80" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="125" y="95" text-anchor="middle">Sources</text>
  <text x="125" y="115" text-anchor="middle" font-size="10">FHIR, VCF, HL7</text>
  <rect x="250" y="60" width="150" height="80" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="325" y="95" text-anchor="middle">Ingestion</text>
  <text x="325" y="115" text-anchor="middle" font-size="10">Kafka, Spark</text>
  <rect x="450" y="60" width="150" height="80" fill="#fce7f3" stroke="#ec4899"/>
  <text x="525" y="95" text-anchor="middle">Storage</text>
  <text x="525" y="115" text-anchor="middle" font-size="10">Delta, Parquet</text>
