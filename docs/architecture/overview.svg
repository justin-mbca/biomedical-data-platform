  <path d="M 200 100 L 250 100" stroke="#94a3b8" marker-end="url(#arrow)"/>
  <path d="M 400 100 L 450 100" stroke="#94a3b8"/>
  <path d="M 600 100 L 650 100" stroke="#94a3b8"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
